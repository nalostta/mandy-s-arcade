<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOADING… — MANDY'S ARCADE</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e8a020;
      --bg: #111008;
      --panel: #1a180e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: #d4c9aa;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    canvas#bg { position: fixed; inset: 0; z-index: 0; }

    .screen {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 1.6rem;
    }

    .crt-box {
      border: 1px solid color-mix(in srgb, var(--accent) 50%, #2e2a1a);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 15%, transparent), inset 0 0 40px rgba(0,0,0,.5);
      border-radius: 6px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 580px;
      width: 100%;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .game-icon { font-size: 3.6rem; animation: iconFloat 3s ease-in-out infinite; }

    .coming-soon {
      font-size: clamp(.6rem, 2vw, 1rem);
      color: var(--accent);
      opacity: .85;
      letter-spacing: .12em;
      animation: breathe 4s ease-in-out infinite;
    }

    .game-name {
      font-size: clamp(.8rem, 2.5vw, 1.4rem);
      color: #f0e4c8;
      letter-spacing: .08em;
      line-height: 1.5;
    }

    .tagline {
      font-size: .44rem;
      color: #5a5040;
      letter-spacing: .2em;
      line-height: 2.2;
    }

    .progress-wrap { width: 100%; }
    .progress-label {
      font-size: .38rem;
      color: #4a4030;
      letter-spacing: .2em;
      margin-bottom: .5rem;
    }
    .progress-track {
      width: 100%;
      height: 10px;
      background: #0e0c06;
      border: 1px solid #2e2a1a;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      box-shadow: 0 0 6px color-mix(in srgb, var(--accent) 60%, transparent);
      animation: loadBar 2.6s cubic-bezier(.4,0,.2,1) infinite;
      opacity: .7;
    }

    .back-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: .46rem;
      background: transparent;
      border: 1px solid color-mix(in srgb, var(--accent) 45%, #333);
      color: color-mix(in srgb, var(--accent) 80%, #ccc);
      padding: .7rem 1.4rem;
      letter-spacing: .18em;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background .15s, color .15s;
    }
    .back-btn:hover {
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border-color: var(--accent);
      color: #f0e4c8;
    }

    .pixel-art {
      display: grid;
      grid-template-columns: repeat(8, 9px);
      grid-template-rows: repeat(4, 9px);
      gap: 2px;
      opacity: .2;
    }
    .px { width: 9px; height: 9px; border-radius: 1px; }

    @keyframes iconFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes breathe {
      0%,100% { opacity: .85; } 50% { opacity: .5; }
    }
    @keyframes loadBar {
      0%  { width: 0%; }
      70% { width: 100%; }
      71% { width: 0%; }
      100%{ width: 0%; }
    }
    @keyframes twinkle {
      0%,100% { opacity: .08; } 50% { opacity: .5; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="screen">
  <div class="crt-box">
    <div class="game-icon" id="gameIcon">🎮</div>
    <div class="coming-soon">— COMING SOON —</div>
    <div class="game-name" id="gameName">LOADING…</div>
    <div class="tagline">THIS GAME IS CURRENTLY UNDER CONSTRUCTION<br>STAY TUNED FOR UPDATES</div>

    <div class="progress-wrap">
      <div class="progress-label">LOADING ASSETS…</div>
      <div class="progress-track"><div class="progress-bar"></div></div>
    </div>

    <a href="index.html" class="back-btn">◀ BACK TO ARCADE</a>
  </div>

  <div class="pixel-art" id="pixels"></div>
</div>

<script>
  const p = new URLSearchParams(location.search);
  const name  = p.get('name')  || 'MYSTERY GAME';
  const icon  = p.get('icon')  || '🎮';
  const color = p.get('color') || '#e8a020';

  document.title = name + ' — MANDY\'S ARCADE';
  document.getElementById('gameName').textContent = name;
  document.getElementById('gameIcon').textContent = icon;
  document.documentElement.style.setProperty('--accent', color);

  // pixel decoration
  const pixWrap = document.getElementById('pixels');
  const cols = ['#e8a020','#c4647a','#4ecdc4','#f0e4c8','#9b7fc4','#7ab87a'];
  for(let i=0;i<32;i++){
    const d = document.createElement('div');
    d.className = 'px';
    d.style.background = cols[Math.floor(Math.random()*cols.length)];
    d.style.animation = `twinkle ${(Math.random()*2.5+1).toFixed(2)}s ${(Math.random()*2).toFixed(2)}s ease-in-out infinite`;
    pixWrap.appendChild(d);
  }

  // warm starfield
  (function(){
    const cv = document.getElementById('bg');
    const cx = cv.getContext('2d');
    let stars=[];
    function resize(){
      cv.width=innerWidth; cv.height=innerHeight;
      stars=Array.from({length:70},()=>({
        x:Math.random()*cv.width, y:Math.random()*cv.height,
        r:Math.random()*.9+.25, phase:Math.random()*Math.PI*2, speed:Math.random()*.01+.003,
        warm:Math.random()>.5,
      }));
    }
    function draw(t){
      cx.clearRect(0,0,cv.width,cv.height);
      stars.forEach(s=>{
        const a=.06+.28*(.5+.5*Math.sin(t*s.speed+s.phase));
        cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2);
        cx.fillStyle=s.warm?`rgba(232,190,120,${a})`:`rgba(180,200,220,${a})`;
        cx.fill();
      });
      requestAnimationFrame(draw);
    }
    addEventListener('resize',resize);
    resize();
    requestAnimationFrame(draw);
  })();
</script>
</body>
</html>
